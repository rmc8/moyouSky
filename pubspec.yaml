name: moyousky
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter
  timeago: ^3.5.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  dio: ^4.0.0
  json_annotation: ^4.1.0
  json_serializable: ^6.3.1
  shared_preferences: ^2.2.1
  bluesky: ^0.9.0
  url_launcher:
  flutter_svg:
  pointycastle: ^3.3.3
  sqflite: ^2.0.0+3
  path_provider: ^2.0.2
  sqflite_sqlcipher:
  flutter_secure_storage:
  share: ^2.0.4
  flutter_riverpod: ^2.4.4
  photo_view: ^0.14.0
  fluttertoast: ^8.2.2
  permission_handler: ^11.0.1
  image_gallery_saver: ^2.0.3
  intl: ^0.18.1
  visibility_detector: ^0.4.0+2
  scroll_to_index: ^3.0.1
  indexed_list_view: ^2.0.2
  hooks_riverpod: ^2.4.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner:
  flutter_gen_runner:
  flutter_launcher_icons: ^0.13.1
  flutter_linkify: ^6.0.0
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/moyouSkyIconSmall.png
  fonts:
    - family: NotoSunsJP
      fonts:
        - asset: 'assets/font/NotoSansJP-Regular.ttf'
        - asset: 'assets/font/NotoSansJP-SemiBold.ttf'
          weight: 700

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages


flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/moyouSkyAppIcon.png"
  adaptive_icon_background: "assets/icon/moyouSkyBanner.png" # #FFFFFF
  adaptive_icon_foreground: "assets/icon/moyouSkyAppAdaptIcon.png"